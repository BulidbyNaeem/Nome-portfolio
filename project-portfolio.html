<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Website | Project Preview</title>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; object-src 'none'; base-uri 'self'; frame-ancestors 'self'; form-action 'self' mailto:;">
<link rel="stylesheet" href="style.css">
<link rel="preload" as="image" href="portfolio.png">
</head>
<body>

<header>
    <nav>
        <div class="logo">Naeem Khan</div>
        <div class="hamburger" id="hamburger" aria-label="Toggle navigation" aria-expanded="false" aria-controls="nav-links" role="button" tabindex="0">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <ul id="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="projects.html" class="active">Projects</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="skills.html">Skills</a></li>
        </ul>
    </nav>
</header>

<section class="project-preview page-section fade-in-on-scroll">
    <h2 class="fade-in-on-scroll" style="--reveal-delay: 80ms;">Portfolio Website</h2>
    <img src="portfolio.png" alt="Portfolio Website preview" class="project-preview-image fade-in-on-scroll" style="--reveal-delay: 180ms;" width="1355" height="752" decoding="async" fetchpriority="high">
    <a href="projects.html" class="btn primary fade-in-on-scroll" style="--reveal-delay: 280ms;">Back to Projects</a>
</section>

<script>
const hamburger = document.getElementById('hamburger');
const navLinks = document.getElementById('nav-links');

if (hamburger && navLinks) {
    const toggleNav = () => {
        navLinks.classList.toggle('active');
        hamburger.setAttribute('aria-expanded', String(navLinks.classList.contains('active')));
    };

    hamburger.addEventListener('click', toggleNav);
    hamburger.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            toggleNav();
        }
    });
}

function initRevealAnimations() {
    const revealItems = document.querySelectorAll('.fade-in-on-scroll:not(.is-visible)');

    if (revealItems.length === 0) {
        return;
    }

    const pendingItems = [];
    const immediateThreshold = Math.max(window.innerHeight * 0.92, 560);

    revealItems.forEach((item) => {
        if (item.getBoundingClientRect().top <= immediateThreshold) {
            item.classList.add('reveal-now', 'is-visible');
            return;
        }

        pendingItems.push(item);
    });

    if (pendingItems.length === 0) {
        return;
    }

    if (!('IntersectionObserver' in window) || window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
        pendingItems.forEach((item) => item.classList.add('is-visible'));
        return;
    }

    const revealObserver = new IntersectionObserver((entries, observer) => {
        entries.forEach((entry) => {
            if (!entry.isIntersecting) {
                return;
            }

            entry.target.classList.add('is-visible');
            observer.unobserve(entry.target);
        });
    }, {
        threshold: 0.12,
        rootMargin: '0px 0px -10% 0px'
    });

    pendingItems.forEach((item) => revealObserver.observe(item));
}

initRevealAnimations();
</script>

</body>
</html>
